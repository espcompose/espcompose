name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_release:
        description: Force release job when running manually
        type: boolean
        default: false
      force_docs_deploy:
        description: Force docs deploy when running manually
        type: boolean
        default: false
      force_vscode_publish:
        description: Force VS Code extension publish when running manually
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version & Publish
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main' || inputs.force_release }}
    runs-on: ubuntu-latest
    outputs:
      pullRequestNumber: ${{ steps.changesets.outputs.pullRequestNumber }}
      published: ${{ steps.changesets.outputs.published }}

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.CHANGESET_BOT_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Show tool versions
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.11.1

      - name: Show npm version after upgrade
        run: npm -v

      - name: Clear token auth so npm uses OIDC trusted publishing
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV
        
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Enable max npm logging
        run: |
          npm config set loglevel silly

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_BOT_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  publish-vscode-extension:
    name: Publish VS Code Extension
    needs: release
    if: ${{ always() && (needs.release.result == 'success' && needs.release.outputs.published == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_vscode_publish)) }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: extensions/vscode

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build extension
        run: pnpm --filter espcompose-vscode build
        working-directory: .

      - name: Publish to VS Code Marketplace
        run: pnpm vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}

  deploy-docs:
    name: Deploy Docs to GitHub Pages
    needs: release
    if: ${{ always() && (needs.release.result == 'success' && needs.release.outputs.published == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_docs_deploy)) }}
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter espcompose-docs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
